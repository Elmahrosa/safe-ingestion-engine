name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff check
        run: ruff check api core collectors services security infrastructure tests

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Check tracked .env
        run: |
          if git ls-files | grep -q '^\.env$'; then
            echo ".env is tracked by git"
            exit 1
          fi

      - name: Run Bandit
        run: bandit -r api core collectors services security infrastructure -x tests -ll

      - name: Run pip-audit
        run: pip-audit -r requirements.txt

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      APP_NAME: safe-ingestion-engine
      ENVIRONMENT: test
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: INFO
      DATABASE_URL: sqlite:///./data/jobs.db
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      PII_SALT: 0123456789abcdef0123456789abcdef
      DASHBOARD_ADMIN_PASSWORD: StrongPassword123
      API_KEY_HASHES_JSON: '["98483c6eb40b6c31c3d5d3f8b2e80d1e6f6968c31f1f1f8b8f7f7c7c7a7a7a7a"]'
      REQUEST_TIMEOUT_SECONDS: 10
      MAX_RESPONSE_BYTES: 5242880
      ROBOTS_ERROR_MODE: deny
      ALLOW_REDIRECTS: "false"
      RATE_LIMIT_PER_MINUTE: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests -q

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, security, test]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t safe-ingestion-engine:ci .
