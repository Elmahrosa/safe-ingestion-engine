name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install scanners
        run: |
          pip install bandit safety semgrep

      - name: Run Bandit
        run: bandit -r core collectors

      - name: Run Safety
        run: safety check

      - name: Run Semgrep
        run: semgrep --config auto core collectors
