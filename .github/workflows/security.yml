name: security-and-tests

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt bandit pip-audit
      - name: Compile check
        run: python -m compileall api core collectors security services infrastructure tests
      - name: Unit tests
        run: pytest -q
      - name: Bandit
        run: bandit -r api core collectors security services infrastructure -ll
      - name: pip-audit
        run: pip-audit -r requirements.txt
