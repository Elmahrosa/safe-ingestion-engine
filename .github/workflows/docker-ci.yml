name: Docker CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
    tags:
      - "v*"
  pull_request:
    branches: ["main", "dev"]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/safe-ingestion-engine

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint & type-check ──────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy types-requests

      - name: Ruff — lint
        run: ruff check . --output-format=github

      - name: Ruff — format check
        run: ruff format --check .

      - name: Mypy — type check
        run: mypy . --ignore-missing-imports --exclude '__pycache__'

  # ── 2. Security scanning ──────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Bandit — static security analysis
        run: bandit -r . -x __pycache__,.venv,tests -ll

      - name: Check for committed secrets (.env)
        run: |
          if git ls-files | grep -qE '^\.env$'; then
            echo "ERROR: .env file is tracked by git. Remove it and add to .gitignore."
            exit 1
          fi

      - name: pip-audit — dependency vulnerability scan
        run: |
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit --require-hashes=false

  # ── 3. Unit & integration tests ───────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379/0
      PII_MODE: redact
      PII_SALT: test-salt-not-for-production
      USER_AGENT: SafeSaaS-CI/1.0
      DATA_DIR: /tmp/safe-ingestion-test
      DASHBOARD_ADMIN_PASSWORD: ""

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-omit="__pycache__/*,tests/*,.venv/*" \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── 4. Docker build with Buildx & caching ────────────────────────────────
  docker-build:
    name: Docker Build & Cache
    runs-on: ubuntu-latest
    needs: [lint, test]

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (with GHA cache)
        uses: docker/build-action@v5
        with:
          context: .
          push: false
          tags: safe-ingestion-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Docker Compose integration tests ───────────────────────────────────
  docker-compose-test:
    name: Docker Compose Integration Test
    runs-on: ubuntu-latest
    needs: [lint, test]

    env:
      PII_MODE: redact
      PII_SALT: test-salt-not-for-production
      USER_AGENT: SafeSaaS-CI/1.0
      DATA_DIR: /tmp/safe-ingestion-test
      DASHBOARD_ADMIN_PASSWORD: ""
      REDIS_URL: redis://redis:6379/0

    steps:
      - uses: actions/checkout@v6

      - name: Pull latest images
        run: docker compose pull --policy=always

      - name: Start services with docker-compose
        run: docker compose up -d

      - name: Wait for API to be healthy
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:8000/health > /dev/null 2>&1; do echo "Waiting for API..."; sleep 2; done' || {
            echo "API failed to start. Checking logs:";
            docker compose logs;
            exit 1;
          }

      - name: Wait for Redis
        run: timeout 30 bash -c 'until docker exec $(docker compose ps -q redis) redis-cli ping > /dev/null 2>&1; do sleep 1; done'

      - name: Test /health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: /health endpoint returned $STATUS"
            exit 1
          fi

      - name: Test /scan endpoint (basic connectivity)
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" http://localhost:8000/scan \
            -H "Content-Type: application/json" \
            -d '{"url": "http://example.com", "mode": "fast"}' 2>&1)
          STATUS=$(echo "$RESPONSE" | tail -n1)
          echo "Scan endpoint status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "202" ] && [ "$STATUS" != "400" ]; then
            echo "ERROR: /scan endpoint unreachable (status: $STATUS)"
            docker compose logs api
            exit 1
          fi

      - name: Check for errors in logs
        if: failure()
        run: |
          echo "=== API Logs ==="
          docker compose logs api
          echo "=== Worker Logs ==="
          docker compose logs worker
          echo "=== Redis Logs ==="
          docker compose logs redis
          echo "=== Dashboard Logs ==="
          docker compose logs dashboard

      - name: Cleanup
        if: always()
        run: docker compose down -v

  # ── 6. Docker Scout vulnerability scanning ────────────────────────────────
  docker-scout:
    name: Docker Scout Security Scan
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image for scanning
        uses: docker/build-action@v5
        with:
          context: .
          tags: safe-ingestion-engine:scout
          push: false
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha

      - name: Load image into Docker
        run: docker load --input /tmp/image.tar

      - name: Run Docker Scout scan
        uses: docker/scout-action@v1
        with:
          image: safe-ingestion-engine:scout
          only-severities: critical,high
          exit-code: true
          write-comment: false

  # ── 7. Trivy container vulnerability scan ────────────────────────────────
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-action@v5
        with:
          context: .
          tags: safe-ingestion-engine:trivy
          push: false
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha

      - name: Load image into Docker
        run: docker load --input /tmp/image.tar

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: safe-ingestion-engine:trivy
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ── 8. Build & publish to Docker Hub (main branch only) ───────────────────
  docker-publish:
    name: Build & Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build, docker-compose-test, docker-scout, trivy-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        if: github.ref == 'refs/heads/main'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "Safe Ingestion Engine - Enterprise recon & vulnerability scanning"
          description: |
            # Safe Ingestion Engine

            Enterprise-grade security recon and vulnerability scanning platform for Safe.

            ## Features
            - **Async Scanning**: Submit URLs for asynchronous analysis via `/scan` endpoint
            - **Health Checks**: Built-in `/health` endpoint for monitoring
            - **Celery Workers**: Distributed task processing with Redis backend
            - **Streamlit Dashboard**: Real-time analytics and visualization
            - **PII Protection**: Configurable PII redaction (email, phone, SSN, etc.)

            ## Quick Start

            ```bash
            docker compose up -d
            curl http://localhost:8000/health
            ```

            ## Endpoints
            - `GET /health` - Service health check
            - `POST /scan` - Submit URL for scanning
            - `GET /results/{task_id}` - Retrieve scan results

            ## Environment Variables
            - `REDIS_URL` - Redis connection string (default: redis://redis:6379/0)
            - `PII_MODE` - PII handling mode (default: redact)
            - `PII_SALT` - Salt for PII obfuscation
            - `USER_AGENT` - Custom User-Agent header

            Built with FastAPI, Celery, Redis, and Streamlit.

  # ── 9. Summary report ─────────────────────────────────────────────────────
  report:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, security, test, docker-build, docker-compose-test, docker-scout, trivy-scan, docker-publish]

    steps:
      - name: Generate summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint**: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security**: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Build**: ${{ needs.docker-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Compose Tests**: ${{ needs.docker-compose-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Scout**: ${{ needs.docker-scout.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trivy Scan**: ${{ needs.trivy-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Publish**: ${{ needs.docker-publish.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: \`linux/amd64,linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
