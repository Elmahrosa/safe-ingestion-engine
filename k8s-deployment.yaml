---
# Kubernetes Deployment Manifest - Safe Ingestion Engine
# Usage: kubectl apply -f k8s-deployment.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: safe-ingestion

---
apiVersion: v1
kind: Secret
metadata:
  name: safe-secrets
  namespace: safe-ingestion
type: Opaque
stringData:
  redis-url: "redis://redis:6379/0"
  pii-salt: "change-this-to-random-32-char-salt"
  admin-password: "change-this-strong-password"
  api-key: "sk-placeholder-api-key"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: safe-config
  namespace: safe-ingestion
data:
  PII_MODE: "redact"
  USER_AGENT: "SafeIngestion/1.0"
  CORS_ORIGINS: "https://safe.teosegypt.com"

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: safe-ingestion
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: safe-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: safe-ingestion-service
  namespace: safe-ingestion
spec:
  selector:
    app: safe-ingestion-engine
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  type: LoadBalancer

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safe-ingestion-api
  namespace: safe-ingestion
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: safe-ingestion-engine
      component: api
  template:
    metadata:
      labels:
        app: safe-ingestion-engine
        component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: api
        image: ghcr.io/elmahrosa/safe-ingestion-engine:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: safe-secrets
              key: redis-url
        - name: PII_SALT
          valueFrom:
            secretKeyRef:
              name: safe-secrets
              key: pii-salt
        - name: SAFE_API_KEY
          valueFrom:
            secretKeyRef:
              name: safe-secrets
              key: api-key
        - name: PII_MODE
          valueFrom:
            configMapKeyRef:
              name: safe-config
              key: PII_MODE
        - name: USER_AGENT
          valueFrom:
            configMapKeyRef:
              name: safe-config
              key: USER_AGENT
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: safe-config
              key: CORS_ORIGINS
        command: ["uvicorn"]
        args: ["api.server:app", "--host", "0.0.0.0", "--port", "8000"]
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: safe-ingestion-api-hpa
  namespace: safe-ingestion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: safe-ingestion-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
