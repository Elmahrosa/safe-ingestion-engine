# Deployment

## Canonical deployment targets

- API container runs `uvicorn api.main:app --host 0.0.0.0 --port 8000`
- Worker container runs `celery -A infrastructure.queue.celery_app worker --loglevel=INFO`

## Environment variables

Required:
- `PII_SALT` (minimum 32 characters)
- `DASHBOARD_ADMIN_PASSWORD` (minimum 12 characters)
- `API_KEY_HASHES_JSON` (JSON array of SHA-256 API key hashes)
- `REDIS_URL`
- `CELERY_BROKER_URL`
- `CELERY_RESULT_BACKEND`

## Local stack

```bash
cp .env.example .env
docker compose up --build
```

## Production advice

For real production:
- use Postgres instead of SQLite
- terminate TLS in your ingress or reverse proxy
- put Redis behind auth/network controls
- store secrets outside the repo and outside `.env`
- set `ROBOTS_ERROR_MODE=deny`
- keep `ALLOW_REDIRECTS=false` unless you have a business reason to enable redirects
