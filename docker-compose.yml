version: "3.9"

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      uvicorn api.server:app
      --host 0.0.0.0
      --port 8000
      --workers 2
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A workers.tasks worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  redis_data:
