version: "3.9"

services:

  api:
    build: .
    container_name: safe-ingestion-api
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ingestion_data:/app/data
    depends_on:
      - redis

  worker:
    build: .
    container_name: safe-ingestion-worker
    command: celery -A api.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ingestion_data:/app/data
    depends_on:
      - redis

  dashboard:
    build: .
    container_name: safe-ingestion-dashboard
    command: streamlit run dashboard/app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ingestion_data:/app/data

  redis:
    image: redis:7
    container_name: safe-ingestion-redis
    ports:
      - "6379:6379"

volumes:
  ingestion_data:
