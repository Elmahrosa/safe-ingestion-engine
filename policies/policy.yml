version: 1
defaults:
  max_requests_per_domain_per_day: 20
  min_seconds_between_requests: 2
  max_bytes: 2000000
  allowed_content_types:
    - text/html
    - application/json
  block_weekends: false

domains:
  - match: "www.boi.org.il"
    action: "allow"
    note: "Allowed only if robots permits"
  - match: "*.gov"
    action: "deny"
    note: "Example: block sensitive TLD patterns"
